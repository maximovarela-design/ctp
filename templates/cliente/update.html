<!DOCTYPE html>
<html lang="es">
<head>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <title>Clientes - Editar</title>
</head>
<body class="container mt-5" style="max-width: 500px;">
    <h2>✏️ Editar Datos del Cliente</h2>
    <form method="POST" class="card p-4 shadow-sm mt-3">
        {% csrf_token %}
        <div class="mb-3">
            <label class="form-label">Nombre</label>
            <input type="text" name="nombre" value="{{ cliente.nombre }}" class="form-control" required>
        </div>
        <div class="mb-3">
            <label class="form-label">Apellido</label>
            <input type="text" name="apellido" value="{{ cliente.apellido }}" class="form-control" required>
        </div>
        <div class="mb-3">
            <label class="form-label">Teléfono</label>
            <input type="text" name="telefono" value="{{ cliente.telefono|default:'' }}" class="form-control">
        </div>
        <div class="d-flex justify-content-between">
            <button type="submit" class="btn btn-warning">Actualizar</button>
            <a href="{% url 'listar_clientes' %}" class="btn btn-secondary">Cancelar</a>
        </div>
    </form>
</body>
</html>
