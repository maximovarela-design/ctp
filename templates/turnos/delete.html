<!DOCTYPE html>
<html lang="es">
<head>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <title>Turnos - Eliminar</title>
</head>
<body class="container mt-5 text-center" style="max-width: 500px;">
    <div class="card p-4 border-danger shadow-sm">
        <h3 class="text-danger">⚠ ¿Cancelar Turno?</h3>
        <p>¿Estás seguro de que quieres eliminar el turno para el vehículo <strong>{{ object.vehiculo }}</strong>?</p>
        <form method="POST">
            {% csrf_token %}
            <button type="submit" class="btn btn-danger me-2">Sí, Eliminar</button>
            <a href="{% url 'listar_turnos' %}" class="btn btn-secondary">Volver a la Agenda</a>
        </form>
    </div>
</body>
</html>
