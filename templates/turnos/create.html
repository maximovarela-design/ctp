<!DOCTYPE html>
<html lang="es">
<head>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <title>Turnos - Crear</title>
</head>
<body class="container mt-5" style="max-width: 500px;">
    <h2>📅 Agendar Nuevo Turno</h2>
    <form method="POST" class="card p-4 shadow-sm mt-3">
        {% csrf_token %}
        {{ form.as_p }}
        <div class="d-flex justify-content-between mt-3">
            <button type="submit" class="btn btn-success">Agendar</button>
            <a href="{% url 'listar_turnos' %}" class="btn btn-secondary">Cancelar</a>
        </div>
    </form>
</body>
</html>
